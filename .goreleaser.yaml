version: 2

project_name: lazycommit

release:
  prerelease: false
  github:
    owner: m7medVision
    name: lazycommit

builds:
  - id: lazycommit
    main: .
    binary: lazycommit
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: archive
    ids: [lazycommit]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
